name: Publish coordinator image

on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk/**'
      - 'packages/coordinator/**'
      - 'docker/coordinator.Dockerfile'
      - '.github/workflows/publish-coordinator.yml'
  workflow_dispatch:

concurrency:
  group: publish-coordinator
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dozzze-coord
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=git-
            type=semver,pattern={{version}}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/coordinator.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
